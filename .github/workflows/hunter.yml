name: ߛ Asosin Hunter — Hourly M3U8 Search

on:
  schedule:
    - cron: "0 * * * *"   # каждый час
  workflow_dispatch:        # ручной запуск

permissions:
  contents: write

jobs:
  hunt:
    name: Hunt & Verify Streams
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: ߓ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ߐ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: ߓ Install dependencies
        run: pip install aiohttp

      - name: ߔ Run Hunter
        run: python scripts/hunter.py

      - name: ߓ Stats
        run: |
          TOTAL=$(grep -c "^http" playlist/asosin.m3u 2>/dev/null || echo 0)
          echo "### ߛ Asosin-Project — результаты поиска" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| ߓ Рабочих каналов | **${TOTAL}** |" >> $GITHUB_STEP_SUMMARY
          echo "| ߕ Время запуска | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| ߓ Плейлист | \`playlist/asosin.m3u\` |" >> $GITHUB_STEP_SUMMARY

      - name: ߒ Commit & Push
        run: |
          git config user.name  "asosin-bot"
          git config user.email "bot@asosin-project"
          git add playlist/
          if git diff --cached --quiet; then
            echo "Нет изменений — коммит пропущен"
          else
            TOTAL=$(grep -c "^http" playlist/asosin.m3u 2>/dev/null || echo 0)
            git commit -m "ߛ auto: ${TOTAL} каналов [$(date -u '+%Y-%m-%d %H:%M')]"
            git push
          fi
